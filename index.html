<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xatSpace - Mnna</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --soft-pink: #ff66b2;
            --dark-pink-bg: #120108; /* Tom magenta bem escuro */
            --neon-glow: 0 0 15px #ff007f;
            --glass: rgba(25, 1, 12, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-pink-bg); color: white;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Fundo Estrelado em todas as telas --- */
        #stars-bg {
            position: fixed; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at center, #2a0314, #120108, #000000);
        }
        .stars {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; animation: moveStars 100s linear infinite;
        }
        .twinkle {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: 0; animation: flash 2s infinite ease-in-out;
        }
        @keyframes flash {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 10px var(--soft-pink); }
        }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* --- Notificação de Cópia --- */
        #copy-alert {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--neon-pink); color: white; padding: 20px 40px;
            border-radius: 15px; z-index: 10000; font-weight: bold; font-size: 1.5rem;
            box-shadow: 0 0 30px var(--neon-pink); border: 2px solid white;
            text-transform: uppercase; animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* --- Tela de Entrada --- */
        #entry-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background-color: var(--dark-pink-bg);
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .welcome-title {
            font-size: 5rem; font-weight: bold; margin-bottom: 25px;
            font-family: 'Brush Script MT', cursive, sans-serif;
            color: white; text-shadow: 0 0 20px var(--neon-pink);
        }
        .btn-enter {
            padding: 12px 50px; font-size: 1.2rem; color: white; background: transparent;
            border: 2px solid var(--neon-pink); border-radius: 50px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; box-shadow: var(--neon-glow);
        }
        .btn-enter:hover { background: var(--neon-pink); transform: scale(1.05); }

        /* --- Interface Principal --- */
        #main-interface {
            visibility: hidden; opacity: 0; position: relative; z-index: 10;
            display: flex; gap: 20px; align-items: flex-start;
            transition: opacity 1s ease;
        }
        #profile-card {
            width: 360px; background: var(--glass); border: 2px solid var(--neon-pink);
            border-radius: 20px; padding: 25px; box-shadow: var(--neon-glow);
            text-align: center; backdrop-filter: blur(10px);
        }
        #side-panel {
            width: 0; overflow: hidden; background: var(--glass);
            border-radius: 20px; transition: 0.5s ease-in-out; opacity: 0;
            backdrop-filter: blur(10px);
        }
        #side-panel.open {
            width: 480px; border: 2px solid var(--neon-pink);
            box-shadow: var(--neon-glow); padding: 25px; opacity: 1;
        }

        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--neon-pink); margin-bottom: 15px; object-fit: cover; }
        .menu-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--neon-pink); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .menu-btn:hover, .menu-btn.active { background: var(--neon-pink); box-shadow: var(--neon-glow); }

        .panel-content { display: none; max-height: 55vh; overflow-y: auto; }
        #color-list { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .c-box { width: 100%; aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .photo-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        /* --- Rádio --- */
        .player-container { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--neon-pink); }
        .player-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .player-btn { background: transparent; border: 1px solid var(--neon-pink); color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }

        /* --- Alerta Copyright --- */
        #copy-alert-top { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon-pink); color: white; padding: 12px 25px; border-radius: 50px; z-index: 5000; font-weight: bold; box-shadow: var(--neon-glow); border: 1px solid white; }
    </style>
</head>
<body oncontextmenu="handleRightClick(event)">

<div id="copy-alert">CÓDIGO COPIADO</div>
<div id="copy-alert-top">🔒 Copyright - Acesso Proibido 🔒</div>
<div id="stars-bg"><div class="stars"></div></div>

<div id="entry-page">
    <div class="welcome-title">Bem Vindos</div>
    <button class="btn-enter" onclick="start()">Entrar</button>
</div>

<div id="main-interface">
    <div id="profile-card">
        <h1 style="color: var(--neon-pink); text-transform: uppercase; margin: 0 0 10px 0;">Mnna</h1>
        <img src="https://imgur.com/0h6IQIZ.png" class="profile-img">
        
        <button class="menu-btn" onclick="resetInterface()">Home</button>
        <button class="menu-btn" id="btn-sobre" onclick="openPanel('sobre-content')">Sobre Mim</button>
        <button class="menu-btn" id="btn-fotos" onclick="openPanel('fotos-content')">Fotos</button>
        <button class="menu-btn" id="btn-xat" onclick="openPanel('xat-content')">Xat Comunidade</button>
        <button class="menu-btn" id="btn-cores" onclick="openPanel('cores-content')">Tabela de Cores</button>

        <div class="player-container">
            <div id="track-name" style="font-size: 0.7rem; color: var(--soft-pink); margin-bottom: 5px;">Rádio Mnna</div>
            <audio id="audio-player"></audio>
            <div class="player-controls">
                <button class="player-btn" onclick="prevTrack()">⏮</button>
                <button class="player-btn" style="width: 45px; height: 45px;" onclick="togglePlay()" id="play-btn">▶</button>
                <button class="player-btn" onclick="nextTrack()">⏭</button>
            </div>
        </div>
    </div>

    <div id="side-panel">
        <div id="sobre-content" class="panel-content">
            <h2 style="color: var(--neon-pink); text-align: center;">Sobre Mim</h2>
            <p style="padding: 10px; font-style: italic; text-align: justify; line-height: 1.6;">
                "Ela sabe o que quer, ela sabe quem ela é... ela leva a vida assim, sendo quem ela é."
            </p>
        </div>

        <div id="fotos-content" class="panel-content">
            <h2 style="color: var(--neon-pink); text-align: center;">Fotos</h2>
            <div class="photo-grid">
                <img src="https://imgur.com/0h6IQIZ.png">
                <img src="https://imgur.com/YDKnxJi.png">
                <img src="https://imgur.com/LSZOs8Q.png">
                <img src="https://imgur.com/BGULIuI.png">
                <img src="https://imgur.com/HCn75BA.png">
                <img src="https://imgur.com/QvXRzEF.png">
            </div>
        </div>

        <div id="cores-content" class="panel-content">
            <h2 style="color: var(--neon-pink); text-align: center;">Tabela de Cores</h2>
            <div id="color-list"></div>
        </div>

        <div id="xat-content" class="panel-content">
            <h2 style="color: var(--neon-pink); text-align: center;">Xat</h2>
            <a href="https://xat.com/tuga" target="_blank" class="menu-btn" style="text-decoration:none">Xat Tuga</a>
            <a href="https://xat.com/trade" target="_blank" class="menu-btn" style="text-decoration:none">Xat Trade</a>
        </div>

        <button class="menu-btn" style="margin-top: 20px;" onclick="resetInterface()">Voltar</button>
    </div>
</div>

<script>
    const playlist = [
        { name: "Bon Jovi - Prayer", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=ockzr4s4&dl=1" },
        { name: "Desireless - Voyage", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=nkupjbm3&dl=1" }
    ];
    let currentTrack = 0;
    const player = document.getElementById('audio-player');

    function start() {
        document.getElementById('entry-page').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('entry-page').style.visibility = 'hidden';
            document.getElementById('main-interface').style.visibility = 'visible';
            document.getElementById('main-interface').style.opacity = '1';
        }, 800);
        loadTrack(0);
        player.play();
        createTwinklingStars();
        generate200Colors();
    }

    function loadTrack(i) {
        player.src = playlist[i].url;
        document.getElementById('track-name').innerText = "Música: " + playlist[i].name;
    }

    function togglePlay() {
        if (player.paused) { player.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { player.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); player.play(); }
    function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(currentTrack); player.play(); }

    function generate200Colors() {
        const grid = document.getElementById('color-list');
        for (let i = 0; i < 200; i++) {
            const h = Math.floor((i / 200) * 360);
            const hex = hslToHex(h, 80, 50);
            let d = document.createElement('div');
            d.className = 'c-box'; d.style.background = hex;
            d.onclick = () => { 
                navigator.clipboard.writeText(hex);
                showCopyAlert();
            };
            grid.appendChild(d);
        }
    }

    function showCopyAlert() {
        const alert = document.getElementById('copy-alert');
        alert.style.display = 'block';
        setTimeout(() => { alert.style.display = 'none'; }, 1500);
    }

    function handleRightClick(e) {
        e.preventDefault();
        const alertBox = document.getElementById('copy-alert-top');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
    }

    function createTwinklingStars() {
        const bg = document.getElementById('stars-bg');
        for (let i = 0; i < 80; i++) {
            let star = document.createElement('div');
            star.className = 'twinkle';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(star);
        }
    }

    function resetInterface() {
        document.getElementById('side-panel').classList.remove('open');
        document.querySelectorAll('.panel-content').forEach(pc => pc.style.display = 'none');
    }

    function openPanel(id) {
        resetInterface();
        document.getElementById('side-panel').classList.add('open');
        document.getElementById(id).style.display = 'block';
    }

    function hslToHex(h, s, l) {
        l /= 100; const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }
</script>
</body>
</html>
