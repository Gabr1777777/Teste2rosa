<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xatSpace - WRS</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --soft-pink: #ff66b2;
            --white-pink: #ffe6f2;
            --neon-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --bg-dark: #0a0105;
            --bg-entry: #1a020d;
            --glass: rgba(43, 3, 20, 0.95);
        }

        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark); color: white;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Fundo --- */
        #stars-bg { position: fixed; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #2a0314, #000000); }
        .stars { position: absolute; width: 100%; height: 100%; background: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px); background-size: 200px 200px; animation: moveStars 100s linear infinite; }
        .twinkle { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: flash 2s infinite ease-in-out; }
        @keyframes flash { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 10px white; } }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* --- Rastro do Mouse --- */
        .cursor-trail {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background: white; box-shadow: 0 0 10px white, 0 0 20px var(--neon-pink);
            border-radius: 50%; pointer-events: none; z-index: 999999;
            transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, opacity 0.2s;
        }

        /* --- Tela de Entrada --- */
        #entry-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; background-color: var(--bg-entry);
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .welcome-title { font-size: 5rem; font-family: 'Brush Script MT', cursive; margin-bottom: 25px; }
        .btn-enter { 
            padding: 15px 60px; font-size: 1.5rem; color: white; 
            background: linear-gradient(135deg, var(--neon-pink), white, var(--neon-pink));
            background-size: 200% auto; border: 2px solid white; border-radius: 50px; 
            cursor: pointer; box-shadow: var(--neon-glow); font-weight: bold;
            animation: moveBtn 2s linear infinite;
        }
        @keyframes moveBtn { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* --- Interface --- */
        #main-interface { visibility: hidden; opacity: 0; position: relative; z-index: 100; display: flex; gap: 20px; transition: 1s; }
        #profile-card { width: 360px; background: var(--glass); border: 2px solid var(--neon-pink); border-radius: 20px; padding: 25px; text-align: center; box-shadow: var(--neon-glow); backdrop-filter: blur(10px); }
        
        .menu-btn { 
            display: block; width: 100%; padding: 12px; margin: 8px 0; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--neon-pink); 
            color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .menu-btn:hover { background: var(--neon-pink); box-shadow: var(--neon-glow); }

        #side-panel { width: 0; overflow: hidden; background: var(--glass); border-radius: 20px; transition: 0.5s ease; opacity: 0; backdrop-filter: blur(10px); }
        #side-panel.open { width: 450px; border: 2px solid var(--neon-pink); padding: 25px; opacity: 1; }

        .panel-content { display: none; }
        .animated-gradient {
            background: linear-gradient(270deg, #fff, var(--neon-pink), #fff);
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gMove 3s infinite;
        }
        @keyframes gMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* --- Contador Ajustado --- */
        #visit-counter {
            position: fixed; bottom: 20px; left: 20px; z-index: 500;
            background: rgba(10, 1, 5, 0.9); border: 1px solid var(--neon-pink);
            padding: 8px 15px; border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; box-shadow: var(--neon-glow);
        }
        .label-v { color: var(--neon-pink); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        #count-number { color: #fff; font-size: 20px; font-family: monospace; }
        
        #photo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
        #photo-modal img { max-width: 80%; border: 2px solid var(--neon-pink); border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="event.preventDefault()">

<div id="stars-bg"><div class="stars"></div></div>

<div id="visit-counter">
    <span class="label-v">Visitas</span>
    <span id="count-number">00000</span>
</div>

<div id="photo-modal" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

<div id="entry-page">
    <div class="welcome-title animated-gradient">WRS 2026</div>
    <button class="btn-enter" onclick="start()">Entrar</button>
</div>

<div id="main-interface">
    <div id="profile-card">
        <h1 class="animated-gradient">WRS</h1>
        <img src="https://imgur.com/0h6IQIZ.png" style="width:120px; border-radius:50%; border:2px solid var(--neon-pink); margin-bottom:15px;">
        
        <button class="menu-btn" onclick="resetInterface()">Home</button>
        <button class="menu-btn" onclick="openPanel('sobre')">Sobre Mim</button>
        <button class="menu-btn" onclick="openPanel('fotos')">Fotos</button>
        <button class="menu-btn" onclick="openPanel('xat')">Xat</button>
        
        <div style="margin-top:20px; border-top:1px dashed var(--neon-pink); padding-top:10px;">
            <div id="t-name" style="font-size:11px; color:var(--soft-pink); margin-bottom:5px;">Música: Off</div>
            <audio id="player"></audio>
            <button class="menu-btn" style="width:50px; display:inline-block;" onclick="togglePlay()">▶</button>
        </div>
    </div>

    <div id="side-panel">
        <div id="sobre" class="panel-content">
            <h2 class="animated-gradient">Sobre Mim</h2>
            <p>"Ela sabe o que quer, ela sabe quem ela é."</p>
        </div>
        <div id="fotos" class="panel-content">
            <h2 class="animated-gradient">Galeria</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <img src="https://imgur.com/0h6IQIZ.png" style="width:100%; cursor:pointer;" onclick="openPhoto(this.src)">
                <img src="https://imgur.com/YDKnxJi.png" style="width:100%; cursor:pointer;" onclick="openPhoto(this.src)">
            </div>
        </div>
        <div id="xat" class="panel-content">
            <h2 class="animated-gradient">Comunidade</h2>
            <a href="https://xat.com/tuga" target="_blank" class="menu-btn" style="text-decoration:none; text-align:center; display:block;">Xat Tuga</a>
        </div>
        <button class="menu-btn" style="margin-top:20px;" onclick="resetInterface()">Voltar</button>
    </div>
</div>

<script>
    const playlist = [
        { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" }
    ];

    async function carregarContadores() {
        const ID = "galeria_wrs_reset_v3"; // Novo ID para garantir que comece do zero
        try {
            const res = await fetch(`https://api.counterapi.dev/v1/wrs-galeria/${ID}/up`);
            const data = await res.json();
            document.getElementById('count-number').innerText = (data.count || 0).toString().padStart(5, '0');
        } catch(e) { document.getElementById('count-number').innerText = "00001"; }
    }

    function start() {
        document.getElementById('entry-page').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('entry-page').style.visibility = 'hidden';
            document.getElementById('main-interface').style.visibility = 'visible';
            document.getElementById('main-interface').style.opacity = '1';
        }, 800);
        document.getElementById('player').src = playlist[0].url;
        document.getElementById('t-name').innerText = "Música: " + playlist[0].name;
        carregarContadores();
    }

    function togglePlay() {
        const p = document.getElementById('player');
        if(p.paused) { p.play(); } else { p.pause(); }
    }

    function openPanel(id) {
        resetInterface();
        document.getElementById('side-panel').classList.add('open');
        document.getElementById(id).style.display = 'block';
    }

    function resetInterface() {
        document.getElementById('side-panel').classList.remove('open');
        const contents = document.getElementsByClassName('panel-content');
        for(let c of contents) { c.style.display = 'none'; }
    }

    function openPhoto(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('photo-modal').style.display = 'flex';
    }

    // Rastro do mouse
    const trails = [];
    document.addEventListener('mousemove', (e) => {
        const t = document.createElement('div');
        t.className = 'cursor-trail';
        t.style.left = e.clientX + 'px';
        t.style.top = e.clientY + 'px';
        document.body.appendChild(t);
        trails.push(t);
        if(trails.length > 15) trails.shift().remove();
    });

    // Estrelas
    const bg = document.getElementById('stars-bg');
    for(let i=0; i<50; i++) {
        let s = document.createElement('div');
        s.className = 'twinkle';
        s.style.left = Math.random()*100+'vw';
        s.style.top = Math.random()*100+'vh';
        s.style.animationDelay = Math.random()*5+'s';
        bg.appendChild(s);
    }
</script>
</body>
</html>
