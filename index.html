<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xatSpace - Mnna</title>
    <style>
        /* --- Configurações Globais --- */
        :root {
            --neon-pink: #ff007f;
            --neon-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --bg-pink-main: #1a020d;
            --glass-bg: rgba(43, 3, 20, 0.85);
            --border-neon: 2px solid var(--neon-pink);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-pink-main); color: white;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Fundo Estrelado e Glitter --- */
        #stars-container {
            position: fixed; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at center, #4a0626, #0a0105);
        }

        .glitter {
            position: absolute; width: 2px; height: 2px; background: var(--neon-pink);
            border-radius: 50%; opacity: 0; animation: sparkle 3s infinite;
            box-shadow: 0 0 5px var(--neon-pink);
        }

        @keyframes sparkle {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .animated-gradient {
            background: linear-gradient(270deg, #ffffff, #ff007f, #ffffff, #ff007f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease infinite;
            font-weight: bold;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Estrutura Principal --- */
        #main-wrapper {
            position: relative; z-index: 5;
            display: flex; gap: 20px; align-items: flex-start;
            transition: all 0.5s ease-in-out;
        }

        #profile-container {
            display: none; width: 380px; background: var(--glass-bg);
            border: var(--border-neon); border-radius: 20px; padding: 20px;
            box-shadow: var(--neon-glow); text-align: center; backdrop-filter: blur(8px);
            flex-shrink: 0;
        }

        #content-panel {
            width: 0; overflow: hidden; background: var(--glass-bg);
            border: none; border-radius: 20px; box-shadow: none;
            backdrop-filter: blur(8px); transition: all 0.5s ease-in-out; opacity: 0;
        }

        #content-panel.open {
            width: 500px; border: var(--border-neon); box-shadow: var(--neon-glow);
            padding: 20px; opacity: 1;
        }

        /* --- Página de Entrada --- */
        #entry-page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; transition: opacity 0.8s ease;
        }

        .btn-enter {
            padding: 15px 40px; font-size: 1.2rem; color: white; background: rgba(43, 3, 20, 0.4);
            border: 2px solid var(--neon-pink); border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; animation: pulse-glow 1.5s infinite alternate;
            backdrop-filter: blur(5px);
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 10px var(--neon-pink); }
            to { box-shadow: 0 0 30px var(--neon-pink), 0 0 10px #fff; }
        }

        /* --- Elementos do Perfil --- */
        .profile-img {
            width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon-pink);
            object-fit: cover; margin-bottom: 20px; box-shadow: var(--neon-glow);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            background: transparent; border: 1px solid var(--neon-pink); color: white;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-transform: uppercase; text-decoration: none; text-align: center;
        }

        .btn:hover { background: var(--neon-pink); box-shadow: var(--neon-glow); }
        .btn-active { background: rgba(255, 0, 127, 0.3); box-shadow: var(--neon-glow); }

        /* --- Fotos --- */
        .photo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px 0;
            max-height: 70vh; overflow-y: auto;
        }

        .photo-item {
            position: relative; overflow: hidden; border-radius: 10px; border: 2px solid transparent;
            transition: all 0.3s ease; cursor: pointer; aspect-ratio: 1 / 1;
        }

        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .photo-item:hover { border-color: var(--neon-pink); box-shadow: var(--neon-glow); transform: translateY(-5px); }
        .photo-item:hover img { transform: scale(1.1); }

        #photo-zoom-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; cursor: zoom-out;
        }

        #photo-zoom-overlay.open { display: flex; opacity: 1; }
        #photo-zoom-overlay img { max-width: 90%; max-height: 90%; border-radius: 10px; border: 3px solid #fff; }

        .inner-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2); animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .player-container { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--neon-pink); }

        #custom-alert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.9); color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 1000; box-shadow: 0 0 15px red;
        }

        .color-box { width: 32px; height: 32px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        #copy-toast { visibility: hidden; min-width: 150px; background-color: var(--neon-pink); color: #fff; text-align: center; border-radius: 20px; padding: 8px; position: fixed; z-index: 3000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; }
        #copy-toast.show { visibility: visible; animation: fadeInOutToast 1.5s; }
        @keyframes fadeInOutToast { 0%, 100% { opacity: 0; } 20%, 80% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="showAlert(event)">

<div id="custom-alert">🔒 Copyright - Acesso Proibido 🔒</div>
<div id="copy-toast">Código Copiado!</div>
<div id="photo-zoom-overlay" onclick="closePhotoZoom()"><img src="" id="zoomed-img"></div>

<div id="stars-container">
    <div class="stars"></div>
</div>

<div id="entry-page">
    <div class="welcome-title animated-gradient">Bienvenidos</div>
    <button class="btn-enter" onclick="enterSpace()">Entrar</button>
</div>

<div id="main-wrapper">
    <div id="profile-container">
        <div class="animated-gradient" style="font-size: 2.5rem; margin-bottom: 10px;">Mnna</div>
        <img src="https://imgur.com/0h6IQIZ.png" class="profile-img">
        
        <button class="btn" id="btn-home" onclick="goHome()">Home</button>
        <button class="btn" id="btn-sobre" onclick="toggleInnerContent('sobre')">Sobre Mim</button>
        <button class="btn" id="btn-fotos" onclick="togglePhotoPanel()">Fotos</button>
        <button class="btn" id="btn-comunidade" onclick="toggleInnerContent('comunidade')">Xat Comunidade</button>
        <button class="btn" id="btn-cores" onclick="toggleInnerContent('cores')">Tabela de Cores</button>
        
        <div id="sobre" class="inner-content">
            <p style="font-style: italic; font-size: 0.9rem;">"Ela sabe o que quer, ela sabe quem ela é..."</p>
        </div>

        <div id="comunidade" class="inner-content">
            <a href="https://xat.com/tuga" target="_blank" class="btn">Xat Tuga</a>
            <a href="https://xat.com/butecopremium" target="_blank" class="btn">Xat ButecoPremium</a>
        </div>

        <div id="cores" class="inner-content">
            <div id="color-grid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;"></div>
        </div>
        
        <div style="margin-top:15px; color: var(--neon-pink); font-family: monospace; font-size: 0.8rem;">
            VISITAS: <span id="count">00000</span>
        </div>

        <div class="player-container">
            <div id="track-name" style="font-size: 0.75rem; margin-bottom: 5px;">Música: Mnna Player</div>
            <audio id="audio-player"></audio>
            <div style="display: flex; justify-content: center; gap: 5px;">
                <button class="btn" style="width: 40px; margin:0; padding: 8px;" onclick="prevTrack()">⏮</button>
                <button class="btn" style="width: 50px; margin:0; padding: 8px;" onclick="togglePlay()" id="play-btn">▶</button>
                <button class="btn" style="width: 40px; margin:0; padding: 8px;" onclick="nextTrack()">⏭</button>
            </div>
            <input type="range" style="width: 90%; accent-color: var(--neon-pink);" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume(this.value)">
        </div>
    </div>

    <div id="content-panel">
        <div id="fotos-content">
            <h2 class="animated-gradient">Galeria</h2>
            <div class="photo-grid">
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/0h6IQIZ.png"></div>
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/YDKnxJi.png"></div>
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/LSZOs8Q.png"></div>
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/BGULIuI.png"></div>
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/HCn75BA.png"></div>
                <div class="photo-item" onclick="openPhotoZoom(this)"><img src="https://imgur.com/QvXRzEF.png"></div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        generateGlitter();
        generate50Colors();
        loadTrack(0);
        updateCounter();
    };

    // Função Home: Fecha tudo e volta ao estado inicial
    function goHome() {
        closeAllInnerContent();
        const panel = document.getElementById('content-panel');
        panel.classList.remove('open');
        document.getElementById('btn-fotos').classList.remove('btn-active');
    }

    function closeAllInnerContent() {
        document.querySelectorAll('.inner-content').forEach(div => div.style.display = 'none');
        document.querySelectorAll('#profile-container .btn').forEach(btn => btn.classList.remove('btn-active'));
    }

    function togglePhotoPanel() {
        const panel = document.getElementById('content-panel');
        const btnFotos = document.getElementById('btn-fotos');
        if (!panel.classList.contains('open')) {
            closeAllInnerContent();
            panel.classList.add('open');
            btnFotos.classList.add('btn-active');
        } else {
            panel.classList.remove('open');
            btnFotos.classList.remove('btn-active');
        }
    }

    function toggleInnerContent(id) {
        const content = document.getElementById(id);
        const btn = document.getElementById('btn-' + id);
        if (document.getElementById('content-panel').classList.contains('open')) {
            togglePhotoPanel();
        }
        if (content.style.display === 'block') {
            content.style.display = 'none';
            btn.classList.remove('btn-active');
        } else {
            closeAllInnerContent();
            content.style.display = 'block';
            btn.classList.add('btn-active');
        }
    }

    function openPhotoZoom(element) {
        document.getElementById('zoomed-img').src = element.querySelector('img').src;
        document.getElementById('photo-zoom-overlay').classList.add('open');
    }

    function closePhotoZoom() { document.getElementById('photo-zoom-overlay').classList.remove('open'); }

    function enterSpace() {
        document.getElementById('entry-page').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('entry-page').style.display = 'none';
            document.getElementById('profile-container').style.display = 'block';
        }, 800);
        player.play();
    }

    function updateCounter() {
        let count = localStorage.getItem('visit_count_mnna') || 0;
        count++;
        localStorage.setItem('visit_count_mnna', count);
        document.getElementById('count').innerText = count.toString().padStart(5, '0');
    }

    function generateGlitter() {
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 50; i++) {
            const g = document.createElement('div');
            g.className = 'glitter';
            g.style.left = Math.random() * 100 + 'vw';
            g.style.top = Math.random() * 100 + 'vh';
            g.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(g);
        }
    }

    function showAlert(e) {
        e.preventDefault();
        const alertBox = document.getElementById('custom-alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
    }

    document.onkeydown = function(e) {
        if ((e.ctrlKey && e.keyCode === 85) || e.keyCode === 123) { showAlert(e); return false; }
    };

    function generate50Colors() {
        const grid = document.getElementById('color-grid');
        const colors = ['#FFFFFF','#D3D3D3','#808080','#000000','#FF007F','#FF3399','#FF66B2','#FF99CC','#FF0000','#CC0000','#00FF00','#009900','#00FFFF','#0000FF','#FFFF00','#FF00FF','#FFA500','#A52A2A'];
        colors.forEach(c => {
            let b = document.createElement('div');
            b.className = 'color-box';
            b.style.background = c;
            b.onclick = () => {
                navigator.clipboard.writeText(c);
                const toast = document.getElementById('copy-toast');
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 1500);
            };
            grid.appendChild(b);
        });
    }

    const playlist = [
        { name: "Bon Jovi", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=ockzr4s4&dl=1" },
        { name: "Desireless", url: "https://www.dropbox.com/scl/fi/cqqhzkv1ll1p09z7qgylp/Desireless-voyage-voyage.mp3.mp3?rlkey=hscvkehw7n7vvgi2im4rwhom7&st=nkupjbm3&dl=1" }
    ];
    let currentTrack = 0;
    const player = document.getElementById('audio-player');
    function loadTrack(i) { player.src = playlist[i].url; document.getElementById('track-name').innerText = "Música: " + playlist[i].name; }
    function togglePlay() { if (player.paused) player.play().then(()=> document.getElementById('play-btn').innerText = "⏸"); else { player.pause(); document.getElementById('play-btn').innerText = "▶"; } }
    function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); player.play(); }
    function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(currentTrack); player.play(); }
    function updateVolume(val) { player.volume = val; }
    loadTrack(0);
</script>
</body>
</html>
