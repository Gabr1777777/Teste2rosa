<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GALERIA XATSPACE - AUTO LOAD</title>
    <style>
        :root { --neon-pink: #ff007f; --bg-dark: #0a0105; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #stars { position: fixed; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle, #1a020d, #000); }

        .header { position: relative; z-index: 10; margin: 20px 0; text-align: center; }
        .header h1 { font-size: 2rem; text-shadow: 0 0 15px var(--neon-pink); text-transform: uppercase; margin: 0; }

        .gallery-grid {
            position: relative; z-index: 10;
            display: flex; gap: 20px; justify-content: center;
            width: 95%; height: 80vh; margin: 0 auto;
        }

        .xat-card {
            width: 48%; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-pink);
            border-radius: 15px;
            overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }

        .card-header {
            padding: 10px; background: var(--neon-pink);
            color: white; font-weight: bold; text-align: center;
            text-transform: uppercase; font-size: 0.9rem;
        }

        .iframe-container { width: 100%; height: 100%; background: #000; position: relative; }
        
        /* Ajuste do Zoom para caber no quadrado */
        iframe { 
            width: 125%; height: 125%; 
            border: none; 
            transform: scale(0.8); 
            transform-origin: 0 0;
        }
    </style>
</head>
<body>

<div id="stars"></div>

<div class="header">
    <h1>Galeria XatSpace</h1>
</div>

<div class="gallery-grid">
    <div class="xat-card">
        <div class="card-header">Xatspace - Homem (Gabriel)</div>
        <div class="iframe-container">
            <iframe id="frame-homem"></iframe>
        </div>
    </div>

    <div class="xat-card">
        <div class="card-header">Xatspace - Mulher (Name)</div>
        <div class="iframe-container">
            <iframe id="frame-mulher"></iframe>
        </div>
    </div>
</div>

<script>
    // 1. COLA O CONTEÚDO DO PERFIL 1 (GABRIEL) ABAIXO:
    const codHomem = `COLE_AQUI_O_TEXTO_PERFIL_1`;

    // 2. COLA O CONTEÚDO DO PERFIL 2 (ROSA) ABAIXO:
    const codMulher = `COLE_AQUI_O_TEXTO_PERFIL_2`;

    function carregar() {
        // Carregar Homem
        const frameH = document.getElementById('frame-homem');
        const docH = frameH.contentWindow.document;
        docH.open();
        docH.write(codHomem);
        docH.close();

        // Carregar Mulher
        const frameM = document.getElementById('frame-mulher');
        const docM = frameM.contentWindow.document;
        docM.open();
        docM.write(codMulher);
        docM.close();

        // ESPERA 1 SEGUNDO E PULA A TELA DE ENTRADA AUTOMATICAMENTE
        setTimeout(() => {
            try {
                // Tenta clicar no botão "Entrar" do perfil homem
                const btnH = docH.querySelector('button');
                if(btnH) btnH.click();

                // Tenta clicar no botão "Entrar" do perfil mulher
                const btnM = docM.querySelector('button') || docM.querySelector('.btn-enter');
                if(btnM) btnM.click();
            } catch(e) { console.log("Erro ao pular intro:", e); }
        }, 1000);
    }

    window.onload = carregar;
</script>

</body>
</html>
