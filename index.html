<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Xatspace - Home</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --bg-dark: #0a0105;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Fundo Estrelado */
        #stars-bg { position: fixed; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #1a020d, #000); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 10px white; } }

        /* Container Principal */
        .main-card {
            position: relative; z-index: 10;
            text-align: center; background: rgba(255, 255, 255, 0.05);
            padding: 50px; border-radius: 30px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(10px);
            width: 400px;
        }

        h1 { font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon-pink); letter-spacing: 3px; }

        /* Botões */
        .btn {
            display: block; width: 100%; padding: 15px; margin: 15px 0;
            background: transparent; border: 2px solid var(--neon-pink);
            color: white; text-decoration: none; font-weight: bold;
            border-radius: 50px; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
        }
        .btn:hover { background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); transform: scale(1.05); }

        .submenu { display: none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 20px; }

        /* Visualizador de Iframe */
        #viewer {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 100; background: black;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 110;
            padding: 10px 20px; background: var(--neon-pink);
            border: 2px solid white; color: white; border-radius: 5px;
            cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="stars-bg"></div>

<div class="main-card">
    <h1>Xatspace</h1>
    
    <button class="btn" onclick="toggleGaleria()">Galeria de Xatspace</button>

    <div id="submenu" class="submenu">
        <button class="btn" onclick="abrir('https://tinyurl.com/galeria-gif')">Xatspace - Galeria Gifs</button>
        <button class="btn" onclick="abrir('https://tinyurl.com/perfilgab')">Xatspace - Perfil - SENHA: 1009</button>
    </div>
</div>

<div id="viewer">
    <button class="back-btn" onclick="fechar()">← VOLTAR</button>
    <iframe id="frame"></iframe>
</div>

<script>
    // Criar Estrelas
    const bg = document.getElementById('stars-bg');
    for(let i=0; i<100; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.width = s.style.height = Math.random() * 2 + 'px';
        s.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(s);
    }

    function toggleGaleria() {
        const sub = document.getElementById('submenu');
        sub.style.display = (sub.style.display === 'block') ? 'none' : 'block';
    }

    function abrir(url) {
        document.getElementById('frame').src = url;
        document.getElementById('viewer').style.display = 'block';
    }

    function fechar() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('frame').src = '';
    }
</script>

</body>
</html>
