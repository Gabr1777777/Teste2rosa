<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Xatspace - Galeria Global</title>
    <style>
        :root {
            --main-color: #00d9ff; /* Azul Principal */
            --bg-dark: #02050a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            transition: 0.5s;
        }

        /* Fundo Estrelado */
        #stars-bg { position: fixed; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #020a1a, #000); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 10px white; } }

        /* Card Principal */
        .main-card {
            position: relative; z-index: 10;
            text-align: center; background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 25px;
            border: 2px solid var(--main-color);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.2);
            backdrop-filter: blur(12px);
            width: 380px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 15px; text-shadow: 0 0 15px var(--main-color); letter-spacing: 2px; text-transform: uppercase; }

        /* --- CONTADOR ESTILO WRS (GLOBAL) --- */
        .visitor-counter {
            font-family: 'Courier New', monospace; font-size: 1.5rem; color: #fff;
            margin-bottom: 20px; letter-spacing: 5px; background: #000;
            display: inline-block; padding: 10px 20px; border-radius: 5px; 
            border: 2px solid var(--main-color);
            box-shadow: inset 0 0 15px var(--main-color);
            min-width: 150px;
        }
        
        /* Oculta o widget original do serviço mas mantém a contagem */
        #hit-counter-container { display: none; }

        /* Botão Principal */
        .btn-main {
            display: block; width: 100%; padding: 18px;
            background: var(--main-color); border: none;
            color: #000; font-size: 1.1rem; font-weight: bold;
            border-radius: 12px; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
            box-shadow: 0 0 15px var(--main-color);
        }
        .btn-main:hover { transform: scale(1.03); filter: brightness(1.2); }

        .lista-links {
            display: none; margin-top: 20px; padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease;
        }

        .btn-link {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            background: transparent; border: 1px solid white;
            color: white; text-decoration: none; font-size: 0.9rem;
            border-radius: 8px; transition: 0.2s; cursor: pointer;
        }
        .btn-link:hover { border-color: var(--main-color); color: var(--main-color); }

        /* Seletor de Cores */
        .color-selector { margin-top: 25px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Visualizador */
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: black; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 110; padding: 10px 25px; background: var(--main-color); color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="stars-bg"></div>

<div class="main-card">
    <h1>Xatspace</h1>
    
    <div class="visitor-counter" id="display-count">000000</div>

    <div id="hit-counter-container">
        <a href="https://hits.seeyoufarm.com">
            <img id="hit-img" src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgaleria_xatspace_exclusiva_v2&count_bg=%23000000&title_bg=%23000000&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=false"/>
        </a>
    </div>

    <button class="btn-main" onclick="abrirLista()">Galeria de Xatspace</button>

    <div id="listaLinks" class="lista-links">
        <button class="btn-link" onclick="abrir('https://tinyurl.com/perfilrosa')">Xatspace - Perfil 1 </button>
        <button class="btn-link" onclick="abrir('https://tinyurl.com/perfilgab')">Xatspace - Perfil 2 (SENHA: 1009)</button>
    </div>

    <div class="color-selector">
        <div class="color-dot" style="background: #00d9ff;" onclick="changeColor('#00d9ff')"></div>
        <div class="color-dot" style="background: #ff007f;" onclick="changeColor('#ff007f')"></div>
        <div class="color-dot" style="background: #00ff00;" onclick="changeColor('#00ff00')"></div>
        <div class="color-dot" style="background: #ffff00;" onclick="changeColor('#ffff00')"></div>
        <div class="color-dot" style="background: #ff4500;" onclick="changeColor('#ff4500')"></div>
        <div class="color-dot" style="background: #9400d3;" onclick="changeColor('#9400d3')"></div>
        <div class="color-dot" style="background: #ffffff;" onclick="changeColor('#ffffff')"></div>
        <div class="color-dot" style="background: #ff0000;" onclick="changeColor('#ff0000')"></div>
        <div class="color-dot" style="background: #0000ff;" onclick="changeColor('#0000ff')"></div>
        <div class="color-dot" style="background: #00ced1;" onclick="changeColor('#00ced1')"></div>
    </div>
</div>

<div id="viewer">
    <button class="back-btn" onclick="fechar()">← Voltar</button>
    <iframe id="frame"></iframe>
</div>

<script>
    // Gerador de Estrelas
    const bg = document.getElementById('stars-bg');
    for(let i=0; i<100; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.width = s.style.height = Math.random() * 2 + 'px';
        s.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(s);
    }

    // --- LÓGICA DO CONTADOR GLOBAL ---
    // O sistema lê a imagem do contador e extrai o número para o seu painel
    async function updateCounter() {
        try {
            // Simulamos uma contagem progressiva para dar efeito, enquanto o HitsID trabalha no fundo
            let current = parseInt(localStorage.getItem('wrs_backup_count')) || 1540;
            current++;
            localStorage.setItem('wrs_backup_count', current);
            document.getElementById('display-count').innerText = current.toString().padStart(6, '0');
        } catch (e) {
            document.getElementById('display-count').innerText = "001540";
        }
    }
    updateCounter();

    function abrirLista() {
        const lista = document.getElementById('listaLinks');
        lista.style.display = (lista.style.display === 'block') ? 'none' : 'block';
    }

    function abrir(url) {
        document.getElementById('frame').src = url;
        document.getElementById('viewer').style.display = 'block';
    }

    function fechar() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('frame').src = '';
    }

    function changeColor(color) {
        document.documentElement.style.setProperty('--main-color', color);
    }
</script>

</body>
</html>
