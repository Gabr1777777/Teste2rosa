<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Xatspace - Galeria</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --bg-dark: #0a0105;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Fundo Estrelado */
        #stars-bg { position: fixed; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #1a020d, #000); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 10px white; } }

        /* Card Principal */
        .main-card {
            position: relative; z-index: 10;
            text-align: center; background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 25px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(12px);
            width: 350px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 25px; text-shadow: 0 0 15px var(--neon-pink); letter-spacing: 2px; text-transform: uppercase; }

        /* Botão Principal */
        .btn-main {
            display: block; width: 100%; padding: 18px;
            background: var(--neon-pink); border: none;
            color: white; font-size: 1.1rem; font-weight: bold;
            border-radius: 12px; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-pink);
        }
        .btn-main:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* Lista Oculta */
        .lista-links {
            display: none; /* Começa escondido */
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 0, 127, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .btn-link {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            background: transparent; border: 1px solid white;
            color: white; text-decoration: none; font-size: 0.9rem;
            border-radius: 8px; font-weight: 500;
            transition: 0.2s; cursor: pointer;
        }
        .btn-link:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--neon-pink); color: var(--neon-pink); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Visualizador de Iframe */
        #viewer {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 100; background: black;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 110;
            padding: 10px 20px; background: var(--neon-pink);
            border: 1px solid white; color: white; border-radius: 5px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="stars-bg"></div>

<div class="main-card">
    <h1>Xatspace</h1>
    
    <button class="btn-main" onclick="abrirLista()">Galeria de Xatspace</button>

    <div id="listaLinks" class="lista-links">
        <button class="btn-link" onclick="abrir('https://tinyurl.com/galeria-gif')">Xatspace - Galeria Gifs</button>
        <button class="btn-link" onclick="abrir('https://tinyurl.com/perfilgab')">Xatspace - Perfil (SENHA: 1009)</button>
    </div>
</div>

<div id="viewer">
    <button class="back-btn" onclick="fechar()">← Voltar</button>
    <iframe id="frame"></iframe>
</div>

<script>
    // Criar Estrelas dinâmicas
    const bg = document.getElementById('stars-bg');
    for(let i=0; i<100; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.width = s.style.height = Math.random() * 2 + 'px';
        s.style.animationDelay = Math.random() * 5 + 's';
        bg.appendChild(s);
    }

    function abrirLista() {
        const lista = document.getElementById('listaLinks');
        // Alterna entre mostrar e esconder
        if (lista.style.display === 'block') {
            lista.style.display = 'none';
        } else {
            lista.style.display = 'block';
        }
    }

    function abrir(url) {
        document.getElementById('frame').src = url;
        document.getElementById('viewer').style.display = 'block';
    }

    function fechar() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('frame').src = '';
    }
</script>

</body>
</html>
