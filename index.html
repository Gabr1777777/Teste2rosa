<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xatSpace - Miel</title>
    <style>
        /* --- Configurações Globais --- */
        :root {
            --neon-pink: #ff007f;
            --neon-glow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            --bg-pink-main: #2b0314;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-pink-main); color: white;
        }

        /* --- Fundo de Estrelas e Glitter --- */
        #stars-container {
            position: fixed; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at center, #4a0626, #1a020d);
        }

        .glitter {
            position: absolute; width: 2px; height: 2px; background: var(--neon-pink);
            border-radius: 50%; opacity: 0; animation: sparkle 3s infinite;
            box-shadow: 0 0 5px var(--neon-pink);
        }

        @keyframes sparkle {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 200px 200px; animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* --- Efeito de CORAÇÕES NEON GLITTER --- */
        .floating-heart {
            position: fixed; z-index: 1; pointer-events: none;
            color: var(--neon-pink);
            text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-pink), 0 0 15px var(--neon-pink), 0 0 20px var(--neon-pink);
            animation: flyUpHeart 7s linear infinite, heartPulse 1.5s ease-in-out infinite alternate;
            opacity: 0;
        }

        @keyframes flyUpHeart {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translateY(-15vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        @keyframes heartPulse {
            from { transform: scale(1); text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-pink); opacity: 0.8; }
            to { transform: scale(1.1); text-shadow: 0 0 10px #fff, 0 0 25px var(--neon-pink); opacity: 1; }
        }

        .animated-gradient {
            background: linear-gradient(270deg, #ffffff, #ff007f, #ffffff, #ff007f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease infinite;
            font-weight: bold;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Interface --- */
        #main-wrapper {
            position: relative; z-index: 5; display: flex;
            justify-content: center; align-items: center; width: 100%; height: 100%;
        }

        #main-container {
            display: none; width: 380px; background: rgba(43, 3, 20, 0.85);
            border: 2px solid var(--neon-pink); border-radius: 20px; padding: 20px;
            box-shadow: var(--neon-glow); text-align: center; backdrop-filter: blur(8px);
        }

        /* --- Página de Entrada --- */
        #entry-page {
            position: absolute; width: 100%; height: 100%;
            background: transparent;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; transition: opacity 0.8s ease;
        }

        .btn-enter {
            padding: 15px 40px; font-size: 1.2rem; color: white; background: rgba(43, 3, 20, 0.6);
            border: 2px solid var(--neon-pink); border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; animation: pulse-glow 1.5s infinite alternate;
            backdrop-filter: blur(5px);
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 10px var(--neon-pink); }
            to { box-shadow: 0 0 30px var(--neon-pink), 0 0 10px #fff; }
        }

        /* --- Fotos Ajustadas --- */
        #fotos {
            position: absolute;
            left: 400px; /* Posiciona ao lado direito do container principal */
            width: 300px;
            text-align: center;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .photo-grid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .photo-grid img:hover {
            border-color: var(--neon-pink);
            box-shadow: var(--neon-glow);
            transform: scale(1.05);
        }

        /* Efeito de Zoom no Clique */
        .photo-grid img:active {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(3);
            z-index: 1000;
            object-fit: contain;
            width: auto;
            height: auto;
            max-width: 90vw;
            max-height: 90vh;
            border: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            background: transparent; border: 1px solid var(--neon-pink); color: white;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--neon-pink); box-shadow: var(--neon-glow); }

        .content-section { display: none; max-height: 60vh; overflow-y: auto; }
        
        .player-container { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--neon-pink); }

        #custom-alert {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.9); color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 1000; box-shadow: 0 0 15px red;
        }

        .color-box {
            width: 25px; height: 25px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.2s;
        }
        .color-box:hover { transform: scale(1.3); z-index: 10; box-shadow: 0 0 8px white; }

        #copy-toast {
            visibility: hidden; min-width: 150px; background-color: var(--neon-pink);
            color: #fff; text-align: center; border-radius: 20px; padding: 8px;
            position: fixed; z-index: 3000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold;
        }
        #copy-toast.show { visibility: visible; animation: fadeInOut 1.5s; }

        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 20%, 80% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="showAlert(event)">

<div id="custom-alert">🔒 Copyright - Acesso Proibido 🔒</div>
<div id="copy-toast">Código Copiado!</div>

<div id="stars-container">
    <div class="stars"></div>
</div>

<div id="entry-page">
    <div class="welcome-title animated-gradient" style="font-size: 3rem; margin-bottom: 30px;">Bienvenidos</div>
    <button class="btn-enter" onclick="enterSpace()">Entrar</button>
</div>

<div id="main-wrapper">
    <div id="main-container">
        <div id="home">
            <div class="animated-gradient" style="font-size: 2.5rem; margin-bottom: 10px;">Mnna</div>
            <img src="https://imgur.com/0h6IQIZ.png" style="width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--neon-pink); object-fit: cover; margin-bottom: 20px; box-shadow: var(--neon-glow);">
            
            <button class="btn" onclick="showSection('sobre')">Sobre Mim</button>
            <button class="btn" onclick="showSection('fotos')">Fotos</button>
            <button class="btn" onclick="showSection('comunidade')">Xat Comunidade</button>
            <button class="btn" onclick="showSection('cores')">Tabela de Cores</button>
            
            <div style="margin-top:10px; color: var(--neon-pink); font-family: monospace;">
                VISITAS: <span id="count">00000</span>
            </div>
        </div>

        <div id="sobre" class="content-section">
            <button class="btn" onclick="showSection('home')">Voltar</button>
            <h2 class="animated-gradient">Sobre Mim</h2>
            <p style="font-style: italic;">"Ela sabe o que quer, ela sabe quem ela é..."</p>
        </div>

        <div id="fotos" class="content-section">
            <button class="btn" onclick="showSection('home')">Fechar Fotos</button>
            <h2 class="animated-gradient">Galeria</h2>
            <div class="photo-grid">
                <img src="https://imgur.com/0h6IQIZ.png">
                <img src="https://imgur.com/YDKnxJi.png">
                <img src="https://imgur.com/LSZOs8Q.png">
                <img src="https://imgur.com/BGULIuI.png">
                <img src="https://imgur.com/HCn75BA.png">
                <img src="https://imgur.com/QvXRzEF.png">
            </div>
        </div>

        <div id="comunidade" class="content-section">
            <button class="btn" onclick="showSection('home')">Voltar</button>
            <h2 class="animated-gradient">Comunidade</h2>
            <a href="https://xat.com/tuga" target="_blank" class="btn">Xat Tuga</a>
            <a href="https://xat.com/butecopremium" target="_blank" class="btn">Xat ButecoPremium</a>
        </div>

        <div id="cores" class="content-section">
            <button class="btn" onclick="showSection('home')">Voltar</button>
            <h2 class="animated-gradient">Cores</h2>
            <div id="color-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;"></div>
        </div>

        <div class="player-container">
            <div id="track-name" style="font-size: 0.8rem; margin-bottom: 5px;">Música: Mnna Player</div>
            <audio id="audio-player"></audio>
            <div style="display: flex; justify-content: center; gap: 5px;">
                <button class="btn" style="width: 40px;" onclick="prevTrack()">⏮</button>
                <button class="btn" style="width: 60px;" onclick="togglePlay()" id="play-btn">▶</button>
                <button class="btn" style="width: 40px;" onclick="nextTrack()">⏭</button>
            </div>
        </div>
    </div>
</div>

<script>
    let count = localStorage.getItem('visit_count_mnna') || 0;
    count++;
    localStorage.setItem('visit_count_mnna', count);
    document.getElementById('count').innerText = count.toString().padStart(5, '0');

    const container = document.getElementById('stars-container');
    const heartTypes = ['💖', '💗', '💓', '💝', '💕'];

    function createEffects() {
        for (let i = 0; i < 40; i++) {
            const g = document.createElement('div');
            g.className = 'glitter';
            g.style.left = Math.random() * 100 + 'vw';
            g.style.top = Math.random() * 100 + 'vh';
            container.appendChild(g);
        }
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 12 + 18) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's, 1.5s';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }, 600);
    }

    function generate200Colors() {
        const grid = document.getElementById('color-grid');
        for (let i = 0; i < 200; i++) {
            const hex = "#" + Math.floor(Math.random()*16777215).toString(16).toUpperCase();
            const b = document.createElement('div');
            b.className = 'color-box';
            b.style.background = hex;
            b.onclick = () => {
                navigator.clipboard.writeText(hex);
                const toast = document.getElementById('copy-toast');
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 1500);
            };
            grid.appendChild(b);
        }
    }

    function enterSpace() {
        document.getElementById('entry-page').style.opacity = '0';
        setTimeout(() => { 
            document.getElementById('entry-page').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
        }, 800);
    }

    function showSection(id) {
        document.querySelectorAll('.content-section, #home').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id !== 'home') document.getElementById('home').style.display = 'none';
        else document.getElementById('home').style.display = 'block';
    }

    function showAlert(e) {
        e.preventDefault();
        const alertBox = document.getElementById('custom-alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
    }

    const playlist = [
        { name: "Bon Jovi", url: "https://www.dropbox.com/scl/fi/dxueil8ofydhnee9lvrk5/Bon-Jovi-livin-on-a-prayer.mp3.mp3?rlkey=06y21a3rhreta1elo2euhcnlr&st=ockzr4s4&dl=1" }
    ];
    let currentTrack = 0;
    const player = document.getElementById('audio-player');
    function loadTrack(i) { player.src = playlist[i].url; document.getElementById('track-name').innerText = "Música: " + playlist[i].name; }
    function togglePlay() { if (player.paused) player.play(); else player.pause(); }

    createEffects();
    generate200Colors();
    loadTrack(0);
</script>
</body>
</html>
